version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: .
    binary: qfex
    ldflags:
      - -s -w -X github.com/qfex/cli/internal/build.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

brews:
  - name: qfex
    repository:
      owner: QFEX-org
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "feat: update qfex to {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/QFEX-org/cli"
    description: "CLI for the QFEX perpetual futures exchange"
    license: "MIT"
    install: |
      bin.install "qfex"
    test: |
      assert_match version.to_s, shell_output("#{bin}/qfex version")

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
